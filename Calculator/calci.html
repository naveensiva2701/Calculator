<html>
    <head>
        <meta charset="utf-8">
        <title>Calculator</title>
        <link rel="shortcut icon" href="./assets/svg/calc.svg" type="image/svg">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="./assets/styles/styles.css">
    </head>

    <body class="flex justify-center item-center">

        <div class="input-cnt"> 

        <input type="number" class="input-box " >
    </div>
        <div class="container grid repeat-4">
            <button class="btn">C</button>            
            <button class="btn"> 
               &#37;
            </button>            
            <button class="btn"><i class="fas fa-trash"></i></button>            
            <button class="btn btn-symbol">&#247;</button>            

            <button class="btn">7</button>            
            <button class="btn">8</button>            
            <button class="btn">9</button>   
            <button class="btn">X</button>   

            <button class="btn">4</button>            
            <button class="btn">5</button>            
            <button class="btn">6</button>       
            <button class="btn btn-symbol">-</button>   

            <button class="btn">1</button>            
            <button class="btn">2</button>            
            <button class="btn">3</button>      
            <button class="btn">+</button>   

            <button class="btn">00</button>            
            <button class="btn">0</button>            
            <button class="btn btn-symbol">.</button>            
            <button class="btn">=</button>            
            

        </div>
       
    </body>

</html>
